version: 2.1

# Define orbs for Docker and Node.js
orbs:
  docker: circleci/docker@2.2.0
  node: circleci/node@5.1.0

# Define executors
executors:
  docker-executor:
    docker:
      - image: cimg/base:stable
    resource_class: medium

# Define jobs
jobs:
  # Build and test the application
  build-and-test:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run linting
          command: npm run lint
      - run:
          name: Build application
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - .next
            - node_modules

  # Build Docker image and push to Docker Hub
  build-and-push-docker:
    executor: docker-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          version: 20.10.14
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            # Set image name and tag
            IMAGE_NAME="esports-management-ui"
            if [ "${CIRCLE_BRANCH}" == "main" ] || [ "${CIRCLE_BRANCH}" == "master" ]; then
              TAG="latest"
            elif [ -n "${CIRCLE_TAG}" ]; then
              TAG="${CIRCLE_TAG}"
            else
              TAG="${CIRCLE_BRANCH}"
            fi
            
            echo "Building image: ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}"
            
            # Build the image
            docker build -t ${IMAGE_NAME}:${TAG} .
            docker tag ${IMAGE_NAME}:${TAG} ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}
            
            # Also tag as latest if this is a version tag
            if [[ "${CIRCLE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              docker tag ${IMAGE_NAME}:${TAG} ${DOCKER_USERNAME}/${IMAGE_NAME}:latest
            fi
      - run:
          name: Login to Docker Hub
          command: |
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
      - run:
          name: Push Docker image
          command: |
            IMAGE_NAME="esports-management-ui"
            if [ "${CIRCLE_BRANCH}" == "main" ] || [ "${CIRCLE_BRANCH}" == "master" ]; then
              TAG="latest"
            elif [ -n "${CIRCLE_TAG}" ]; then
              TAG="${CIRCLE_TAG}"
            else
              TAG="${CIRCLE_BRANCH}"
            fi
            
            echo "Pushing image: ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}"
            docker push ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}
            
            # Also push latest if this is a version tag
            if [[ "${CIRCLE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Pushing latest tag"
              docker push ${DOCKER_USERNAME}/${IMAGE_NAME}:latest
            fi
      - run:
          name: Image information
          command: |
            IMAGE_NAME="esports-management-ui"
            if [ "${CIRCLE_BRANCH}" == "main" ] || [ "${CIRCLE_BRANCH}" == "master" ]; then
              TAG="latest"
            elif [ -n "${CIRCLE_TAG}" ]; then
              TAG="${CIRCLE_TAG}"
            else
              TAG="${CIRCLE_BRANCH}"
            fi
            
            echo "✅ Successfully pushed Docker image!"
            echo "🐳 Image: ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}"
            echo "🌐 Docker Hub: https://hub.docker.com/r/${DOCKER_USERNAME}/${IMAGE_NAME}"
            echo "🚀 Run with: docker run -p 3000:3000 ${DOCKER_USERNAME}/${IMAGE_NAME}:${TAG}"

  # Security scan (optional)
  security-scan:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.14
      - run:
          name: Install Trivy
          command: |
            sudo apt-get update
            sudo apt-get install wget apt-transport-https gnupg lsb-release -y
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install trivy -y
      - run:
          name: Build image for scanning
          command: |
            docker build -t esports-management-ui:scan .
      - run:
          name: Run security scan
          command: |
            trivy image --exit-code 0 --severity HIGH,CRITICAL esports-management-ui:scan

# Define workflows
workflows:
  version: 2
  
  # Main workflow for branches
  build-and-deploy:
    jobs:
      - build-and-test:
          filters:
            branches:
              only: /.*/
            tags:
              only: /.*/
      
      - security-scan:
          requires:
            - build-and-test
          filters:
            branches:
              only:
                - main
                - master
                - develop
            tags:
              only: /^v.*/
      
      - build-and-push-docker:
          requires:
            - build-and-test
          filters:
            branches:
              only:
                - main
                - master
                - develop
            tags:
              only: /^v.*/
          context:
            - docker-hub-creds
  
  # Nightly security scan
  nightly-security:
    triggers:
      - schedule:
          cron: "0 2 * * *"  # Run at 2 AM UTC daily
          filters:
            branches:
              only:
                - main
                - master
    jobs:
      - security-scan