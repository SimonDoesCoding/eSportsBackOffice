version: '3.8'

services:
  esports-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://localhost:7173/api
      - NEXT_PUBLIC_APP_NAME=Esports Management UI
      # Auth0 Configuration
      - AUTH0_SECRET=${AUTH0_SECRET}
      - AUTH0_BASE_URL=${AUTH0_BASE_URL:-https://backoffice.sitechesports.com}
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL:-https://dev-h624znvggxq2nsnp.us.auth0.com}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
    restart: unless-stopped
    container_name: esports-management-ui