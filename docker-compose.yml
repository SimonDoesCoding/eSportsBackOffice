version: '3.8'

services:
  esports-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://api.sitechesports.com/api
      - NEXT_PUBLIC_APP_NAME=Esports Management UI
    restart: unless-stopped
    container_name: esports-management-ui