version: '3.8'

services:
  esports-ui-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://82.165.193.29:5050/api
      - NEXT_PUBLIC_APP_NAME=Esports Management UI
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    container_name: esports-management-ui-dev